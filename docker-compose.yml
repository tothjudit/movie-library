version: '3.8'

services:
  mongo:
    image: mongo:8
    container_name: movie-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: movie-backend
    ports:
      - "8080:8080"
    environment:
      - MongoDbSettings__ConnectionString=mongodb://mongo:27017
      - MongoDbSettings__DatabaseName=MovieLibraryDb
      - MongoDbSettings__MoviesCollectionName=Movies
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend/movie-library-frontend
    container_name: movie-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo_data: